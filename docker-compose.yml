services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chronicle_dev
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "56720:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10

  satellite-mock:
    build:
      context: .
      dockerfile: satellites/mock/Dockerfile
    ports:
      - "18080:8080"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: chronicle_dev
      DB_PORT: "3306"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DATABUS_DB_USER: root
      DATABUS_DB_PASS: root
      DATABUS_DB_NAME: databus
      EVICTION_ENABLED: "true"
      EVICTION_IDLE_MS: "5000"
      EVICTION_SCAN_MS: "3000"
      SECRET_KEY_BASE: "dev_secret_key_base_at_least_64_bytes_long_for_phoenix_endpoint_config_placeholder"
      CONNECTOR_REGISTRY_JSON: >-
        {"connectors":[
          {"id":"rest-main","topics":["rest","http","https"],"placement":"satellite"},
          {"id":"ai-main","topics":["ai","llm"],"placement":"satellite"},
          {"id":"database-main","topics":["database","db","sql"],"placement":"satellite"},
          {"id":"email-main","topics":["email","mail"],"placement":"satellite"},
          {"id":"transform-main","topics":["transform","echo","map"],"placement":"satellite"}
        ]}
      AMQP_SIGNING_ENABLED: "true"
      AMQP_REQUIRE_SIGNATURES: "false"
      AMQP_SIGNING_PRIVATE_KEY_PATH: "/app/config/certs/dev-chronicle-key.pem"
      AMQP_SIGNING_CERTIFICATE_PATH: "/app/config/certs/dev-chronicle-cert.pem"
      AMQP_TRUSTED_CERTIFICATE_PATHS: "/app/config/certs/dev-chronicle-cert.pem"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      satellite-mock:
        condition: service_started

  satellite-rest-ai:
    build:
      context: .
      dockerfile: satellites/python/Dockerfile
    command: ["python", "-u", "-m", "chronicle_satellite.entrypoints.rest_ai"]
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      SATELLITE_CONNECTOR_IDS: "rest-main,ai-main"
      SATELLITE_REST_BEARER_TOKEN: "satellite-token"
      CHRONICLE_MESSAGE_SIGNING: "true"
      CHRONICLE_REQUIRE_SIGNATURES: "true"
      CHRONICLE_SIGNING_KEY: "/satellite/config/certs/dev-chronicle-key.pem"
      CHRONICLE_SIGNING_CERT: "/satellite/config/certs/dev-chronicle-cert.pem"
      CHRONICLE_TRUSTED_CERTS: "/satellite/config/certs/dev-chronicle-cert.pem"
    depends_on:
      rabbitmq:
        condition: service_healthy
      satellite-mock:
        condition: service_started

  satellite-database:
    build:
      context: .
      dockerfile: satellites/python/Dockerfile
    command: ["python", "-u", "-m", "chronicle_satellite.entrypoints.database"]
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      SATELLITE_CONNECTOR_IDS: "database-main"
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: chronicle_dev
      DB_PORT: "3306"
      CHRONICLE_MESSAGE_SIGNING: "true"
      CHRONICLE_REQUIRE_SIGNATURES: "true"
      CHRONICLE_SIGNING_KEY: "/satellite/config/certs/dev-chronicle-key.pem"
      CHRONICLE_SIGNING_CERT: "/satellite/config/certs/dev-chronicle-cert.pem"
      CHRONICLE_TRUSTED_CERTS: "/satellite/config/certs/dev-chronicle-cert.pem"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  satellite-email-transform:
    build:
      context: .
      dockerfile: satellites/python/Dockerfile
    command: ["python", "-u", "-m", "chronicle_satellite.entrypoints.email_transform"]
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      SATELLITE_CONNECTOR_IDS: "email-main,transform-main"
      CHRONICLE_MESSAGE_SIGNING: "true"
      CHRONICLE_REQUIRE_SIGNATURES: "true"
      CHRONICLE_SIGNING_KEY: "/satellite/config/certs/dev-chronicle-key.pem"
      CHRONICLE_SIGNING_CERT: "/satellite/config/certs/dev-chronicle-cert.pem"
      CHRONICLE_TRUSTED_CERTS: "/satellite/config/certs/dev-chronicle-cert.pem"
    depends_on:
      rabbitmq:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    environment:
      MIX_ENV: test
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: chronicle_test
      DB_PORT: "3306"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: mix test --include integration
    profiles:
      - test

volumes:
  mysql_data:
